{{ define "main" }}
  {{ partial "page-header" . }}

  <section class="gc-section--tight" style="padding-top: 0; padding-bottom: clamp(5rem, 9vw, 7rem);">
    <div class="gc-container--narrow">
      {{ with .Content }}
        <div class="content text-center" style="max-width: 36rem; margin: 0 auto;">
          {{ . }}
        </div>
      {{ end }}
    </div>
  </section>
{{ end }}
